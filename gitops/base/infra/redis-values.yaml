# Values override for bitnami/redis chart
architecture: standalone
auth:
  enabled: false  # Dev environment, matches docker-compose
master:
  persistence:
    size: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
replica:
  replicaCount: 0
