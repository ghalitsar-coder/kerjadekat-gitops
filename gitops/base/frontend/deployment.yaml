---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kerjadekat-frontend
  namespace: kerjadekat
  labels:
    app: kerjadekat-frontend
    version: latest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kerjadekat-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: kerjadekat-frontend
        version: latest
    spec:
      containers:
        - name: frontend
          # Jenkins CI updates this image tag on every successful build
          image: ghalitsar/kerjadekat-frontend:0bbb54c
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: kerjadekat-frontend-config
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
