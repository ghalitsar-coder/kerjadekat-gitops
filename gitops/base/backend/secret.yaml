# TODO: Migrate to SealedSecrets or Vault for production.
# kubectl create secret generic kerjadekat-backend-secret \
#   --from-env-file=backend/.env -n kerjadekat --dry-run=client -o yaml
#
# Base64-encode values: echo -n "value" | base64
---
apiVersion: v1
kind: Secret
metadata:
  name: kerjadekat-backend-secret
  namespace: kerjadekat
  labels:
    app: kerjadekat-backend
type: Opaque
stringData:
  # --- Database ---
  DB_PASSWORD: "SuperSecurePassword123!"
  DB_USER: "kerjadekat_admin"
  DB_NAME: "kerjadekat_db"

  # --- JWT ---
  # Generate: openssl rand -base64 32
  JWT_SECRET: "CHANGE_ME_generate_with_openssl_rand_base64_32"

  # --- Auth.js OAuth ---
  AUTH_SECRET: "CHANGE_ME_generate_with_openssl_rand_base64_32"
  AUTH_GOOGLE_ID: "CHANGE_ME"
  AUTH_GOOGLE_SECRET: "CHANGE_ME"
  AUTH_GITHUB_ID: "CHANGE_ME"
  AUTH_GITHUB_SECRET: "CHANGE_ME"

  # --- Xendit ---
  XENDIT_API_KEY: "CHANGE_ME"
  XENDIT_CALLBACK_TOKEN: "CHANGE_ME"
