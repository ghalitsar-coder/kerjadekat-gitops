---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kerjadekat-backend-hpa
  namespace: kerjadekat
  labels:
    app: kerjadekat-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kerjadekat-backend
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
