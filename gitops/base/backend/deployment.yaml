---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kerjadekat-backend
  namespace: kerjadekat
  labels:
    app: kerjadekat-backend
    version: latest
spec:
  replicas: 1  # 1 for Minikube local dev; HPA manages in prod
  selector:
    matchLabels:
      app: kerjadekat-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zero-downtime for WebSocket continuity
  template:
    metadata:
      labels:
        app: kerjadekat-backend
        version: latest
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          # Jenkins CI updates this image tag on every successful build
          image: ghalitsar/kerjadekat-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          # Load non-secret config from ConfigMap
          envFrom:
            - configMapRef:
                name: kerjadekat-backend-config
          # Load secrets individually
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kerjadekat-backend-secret
                  key: DB_PASSWORD
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: kerjadekat-backend-secret
                  key: DB_USER
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: kerjadekat-backend-secret
                  key: DB_NAME
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kerjadekat-backend-secret
                  key: JWT_SECRET
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: kerjadekat-backend-secret
                  key: AUTH_SECRET
            - name: AUTH_GOOGLE_ID
              valueFrom:
                secretKeyRef:
                  name: kerjadekat-backend-secret
                  key: AUTH_GOOGLE_ID
            - name: AUTH_GOOGLE_SECRET
              valueFrom:
                secretKeyRef:
                  name: kerjadekat-backend-secret
                  key: AUTH_GOOGLE_SECRET
            - name: AUTH_GITHUB_ID
              valueFrom:
                secretKeyRef:
                  name: kerjadekat-backend-secret
                  key: AUTH_GITHUB_ID
            - name: AUTH_GITHUB_SECRET
              valueFrom:
                secretKeyRef:
                  name: kerjadekat-backend-secret
                  key: AUTH_GITHUB_SECRET
            - name: XENDIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kerjadekat-backend-secret
                  key: XENDIT_API_KEY
            - name: XENDIT_CALLBACK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kerjadekat-backend-secret
                  key: XENDIT_CALLBACK_TOKEN
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                # Allow in-flight WebSocket connections to drain
                command: ["/bin/sh", "-c", "sleep 5"]
