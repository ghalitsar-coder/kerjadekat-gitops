---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namespaces
  namespace: argocd
spec:
  project: kerjadekat
  source:
    repoURL: https://github.com/ghalitsar-coder/kerjadekat-gitops
    targetRevision: HEAD
    path: gitops/base
    directory:
      include: "namespaces.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
