---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresql
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: kerjadekat
  source:
    repoURL: https://github.com/ghalitsar-coder/kerjadekat-gitops
    targetRevision: HEAD
    path: gitops/base/infra
    # Note: We are deploying our custom StatefulSet, not the Bitnami Helm chart
    # due to the PostGIS image entrypoint conflict.
  destination:
    server: https://kubernetes.default.svc
    namespace: kerjadekat-infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # automated sync disabled for local dev (Minikube)
    # enable for staging/prod by uncommenting:
    # syncPolicy:
    #   automated:
    #     prune: true
    #     selfHeal: true
