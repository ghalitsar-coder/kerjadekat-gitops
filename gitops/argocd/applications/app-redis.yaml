---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: kerjadekat
  source:
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: 19.3.x
    chart: redis
    helm:
      values: |
        architecture: standalone
        auth:
          enabled: false
        master:
          persistence:
            size: 2Gi
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
        replica:
          replicaCount: 0
  destination:
    server: https://kubernetes.default.svc
    namespace: kerjadekat-infra
  syncPolicy: {}
    # automated sync disabled for local dev (Minikube)
    # enable for staging/prod by uncommenting:
    # syncPolicy:
    #   automated:
    #     prune: true
    #     selfHeal: true
