---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd
spec:
  project: kerjadekat
  source:
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: "20.x.x"
    chart: redis
    helm:
      values: |
        auth:
          enabled: false
        image:
          registry: docker.io
          repository: library/redis
          tag: 7.2-alpine
        master:
          persistence:
            enabled: false
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: kerjadekat-infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
