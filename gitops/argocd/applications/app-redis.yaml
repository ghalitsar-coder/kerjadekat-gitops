---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: kerjadekat
  source:
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: 19.3.x
    chart: redis
    helm:
      valueFiles:
        - https://raw.githubusercontent.com/YOUR_ORG/kerjadekat/main/gitops/base/infra/redis-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: kerjadekat-infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
