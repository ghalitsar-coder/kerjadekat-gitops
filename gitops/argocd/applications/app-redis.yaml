---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd
spec:
  project: kerjadekat
  source:
    repoURL: https://charts.bitnami.com/bitnami
    targetRevision: "25.5.3"
    chart: redis
    helm:
      values: |
        auth:
          enabled: false
        image:
          tag: 7.2.5
        master:
          persistence:
            size: 1Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: kerjadekat-infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
