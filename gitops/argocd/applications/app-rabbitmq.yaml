---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rabbitmq
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: kerjadekat
  source:
    repoURL: https://github.com/ghalitsar-coder/kerjadekat-gitops
    targetRevision: HEAD
    path: gitops/base/infra
    directory:
      include: "rabbitmq-statefulset.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: kerjadekat-infra
  syncPolicy: {}
    # automated sync disabled for local dev (Minikube)
    # enable for staging/prod by uncommenting:
    # syncPolicy:
    #   automated:
    #     prune: true
    #     selfHeal: true
