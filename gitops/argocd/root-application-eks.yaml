apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kerjadekat-eks
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ghalitsar-coder/kerjadekat-gitops
    targetRevision: HEAD
    path: gitops/overlays/eks/manifests
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: kerjadekat
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
