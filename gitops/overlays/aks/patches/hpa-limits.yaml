# gitops/overlays/aks/patches/hpa-limits.yaml
# Mengurangi MaxReplicas HPA untuk AKS (Azure for Students limits)
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kerjadekat-backend-hpa
  namespace: kerjadekat
spec:
  minReplicas: 1
  maxReplicas: 2
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kerjadekat-frontend-hpa
  namespace: kerjadekat
spec:
  minReplicas: 1
  maxReplicas: 2
